<form id="hackathonForm">
  <input type="text" name="Student_name" required>

<input type="email" name="Email" required>

<input type="text" name="Mobile" required>

<input type="text" name="College" required>

<textarea name="Skills"></textarea>

<textarea name="Idea"></textarea>

  <button type="submit">Register</button>
</form>

<script>
const webhook = "https://bhartiamit0703july07.app.n8n.cloud/webhook/3bc80916-6b30-451d-8edd-a8266e832f95";

document.getElementById("hackathonForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const obj = Object.fromEntries(new FormData(e.target).entries());

    console.log("Sending:", obj);

    try {

        const response = await fetch(webhook, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(obj)
        });

        console.log("HTTP Status:", response.status);

        const text = await response.text();

        console.log("Response Body:", text);

        alert(text);

    } catch (err) {

        console.error("ERROR:", err);

        alert("ERROR: " + err);

    }
});
</script>
